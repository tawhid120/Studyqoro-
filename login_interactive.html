<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Registration Portal</title>
    <!-- Font Awesome Link for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(90deg, #e2e2e2, #c9d6ff);
            padding: 20px;
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, .2);
            overflow: hidden;
            transition: all 0.5s ease-in-out;
        }

        .container h1 {
            font-size: 36px;
            margin: -10px 0;
        }

        .container p {
            font-size: 14.5px;
            margin: 15px 0;
        }

        form {
            width: 100%;
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            color: #333;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: .6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box {
            right: 50%;
        }

        .form-box.register {
            visibility: hidden;
        }

        .container.active .form-box.register {
            visibility: visible;
        }

        .input-box {
            position: relative;
            margin: 30px 0;
        }

        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #eee;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .input-box input::placeholder {
            color: #888;
            font-weight: 400;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #a0aec0;
        }

        .forgot-link {
            margin: -15px 0 15px;
            text-align: right;
        }

        .forgot-link a {
            font-size: 14.5px;
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link a:hover {
            color: #7494ec;
        }

        .btn {
            width: 100%;
            height: 48px;
            background: #7494ec;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(116, 148, 236, .3);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background: #5d7fd1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .social-icons a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 20px;
            color: #333;
            margin: 0 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            border-color: #7494ec;
            color: #7494ec;
            background-color: #f8fafc;
            transform: translateY(-3px);
        }

        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: '';
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: #7494ec;
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before {
            left: 50%;
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: .6s ease-in-out;
            padding: 30px;
            text-align: center;
        }

        .toggle-panel h1 {
            font-weight: 700;
        }

        .toggle-panel.toggle-left {
            left: 0;
            transition-delay: 1.2s;
        }

        .container.active .toggle-panel.toggle-left {
            left: -50%;
            transition-delay: 0.6s;
        }

        .toggle-panel.toggle-right {
            right: -50%;
            transition-delay: 0.6s;
        }

        .container.active .toggle-panel.toggle-right {
            right: 0;
            transition-delay: 1.2s;
        }

        .toggle-panel p {
            margin-bottom: 20px;
        }

        .toggle-panel .btn {
            width: 160px;
            height: 46px;
            background: transparent;
            border: 2px solid #fff;
            box-shadow: none;
            transition: all 0.3s;
        }

        .toggle-panel .btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 15px;
            }

            .container {
                width: 100%;
                max-width: 440px;
                height: auto;
                min-height: 520px;
                display: flex;
                flex-direction: column;
                border-radius: 20px;
            }

            .form-box {
                position: relative;
                width: 100%;
                height: 100%;
                right: 0 !important;
                padding: 30px 20px;
            }

            .form-box.register {
                display: none;
                visibility: hidden;
            }

            .container.active .form-box.login {
                display: none;
                visibility: hidden;
            }

            .container.active .form-box.register {
                display: flex;
                visibility: visible;
                opacity: 1;
            }

            .toggle-box {
                position: relative;
                width: 100%;
                height: auto;
                order: 2;
                background: #7494ec;
                color: #fff;
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px;
            }

            .toggle-box::before {
                display: none;
            }

            .toggle-panel {
                width: 100%;
                height: auto;
                padding: 24px 20px;
                position: relative;
                right: 0 !important;
                left: 0 !important;
                flex-direction: row;
                justify-content: center;
                gap: 12px;
                transform: none !important;
                transition: none;
            }

            .toggle-panel h1 {
                display: none;
            }

            .toggle-panel p {
                margin-bottom: 0;
                font-size: 13.5px;
            }

            .toggle-panel .btn {
                width: 110px;
                height: 36px;
                font-size: 13px;
                padding: 0;
            }

            .toggle-panel.toggle-left {
                display: flex;
            }

            .container.active .toggle-panel.toggle-left {
                display: none;
            }

            .toggle-panel.toggle-right {
                display: none;
            }

            .container.active .toggle-panel.toggle-right {
                display: flex;
            }
        }

        /* Success toast notification styles */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2d3748;
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 9999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            color: #48bb78;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Login Form -->
        <div class="form-box login">
            <form id="login-form" action="#" onsubmit="handleFormSubmit(event, 'login')">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#" onclick="showForgotMessage(event)">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="#" onclick="handleSocial('Google', event)"><i class="fa-brands fa-google"></i></a>
                    <a href="#" onclick="handleSocial('Facebook', event)"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" onclick="handleSocial('Github', event)"><i class="fa-brands fa-github"></i></a>
                    <a href="#" onclick="handleSocial('LinkedIn', event)"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <!-- Register Form -->
        <div class="form-box register">
            <form id="register-form" action="#" onsubmit="handleFormSubmit(event, 'register')">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with social platforms</p>
                <div class="social-icons">
                    <a href="#" onclick="handleSocial('Google', event)"><i class="fa-brands fa-google"></i></a>
                    <a href="#" onclick="handleSocial('Facebook', event)"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" onclick="handleSocial('Github', event)"><i class="fa-brands fa-github"></i></a>
                    <a href="#" onclick="handleSocial('LinkedIn', event)"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <!-- Toggle Box Background and Panels -->
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <!-- Active dynamic notifications -->
    <div id="toast-notif" class="toast">
        <i class="fa-solid fa-circle-check"></i>
        <div>
            <h4 id="toast-title" style="font-size: 15px; font-weight: 600;">Success</h4>
            <p id="toast-desc" style="font-size: 12px; color: #a0aec0; margin: 2px 0 0 0;">Operation completed successfully.</p>
        </div>
    </div>

    <!-- JavaScript to toggle classes and trigger actions -->
    <script>
        const container = document.querySelector('.container');
        const registerBtn = document.querySelector('.register-btn');
        const loginBtn = document.querySelector('.login-btn');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });

        function showToast(title, desc) {
            const toast = document.getElementById('toast-notif');
            document.getElementById('toast-title').textContent = title;
            document.getElementById('toast-desc').textContent = desc;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function handleSocial(service, event) {
            if(event) event.preventDefault();
            showToast(`${service} Connection`, `Successfully authenticating via ${service}...`);
        }

        function showForgotMessage(event) {
            if(event) event.preventDefault();
            showToast(`Password Recovery`, `A recovery email has been requested. Please check your inbox.`);
        }

        function handleFormSubmit(event, type) {
            event.preventDefault();
            if (type === 'login') {
                showToast(`Login Successful`, `Welcome back student! Swapping to study dashboard.`);
                setTimeout(() => {
                    // Redirect to home dashboard if appropriate
                    window.location.href = "/";
                }, 1500);
            } else {
                showToast(`Registration Successful`, `Your account has been built! Logging in automatically...`);
                setTimeout(() => {
                    // Turn active class off to simulate returning to login
                    container.classList.remove('active');
                }, 2000);
            }
        }
    </script>

</body>
</html>
